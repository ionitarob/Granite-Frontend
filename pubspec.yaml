name: configtool_granite_frontend
description: "ConfigTool Granite Frontend"
publish_to: 'none'
version: 2.4.4

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.1.1
  http: ^1.5.0
  flutter_secure_storage: ^8.0.0
  lottie: ^3.3.0
  provider: ^6.0.5
  image_picker: ^0.8.7
  file_picker: ^8.1.7
  file_selector: ^1.0.3
  desktop_drop: ^0.6.0
  web_socket_channel: ^2.2.0
  fl_chart: ^1.1.1
  path_provider: ^2.0.11
  open_filex: ^4.7.0
  package_info_plus: ^4.0.0
  excel: ^4.0.6
  http_parser: ^4.0.0
  mobile_scanner: ^6.0.2
  barcode_widget: ^2.0.4
  pdf: ^3.10.7
  syncfusion_flutter_pdfviewer: ^27.2.5
  intl: ^0.19.0
  audioplayers: ^6.5.1
  speech_to_text: ^7.3.0
  flutter_tts: ^3.8.5
  permission_handler: ^12.0.1
  speech_to_text_windows: ^1.0.0+beta.8
  dropdown_button2: ^2.3.9
  printing: ^5.13.2
  connectivity_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - lib/assets/AI Sphere.json
    - lib/assets/logo.png
    - assets/sounds/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "lib/assets/logo.png"
  macos:
    generate: true
    image_path: "lib/assets/logo.png"
